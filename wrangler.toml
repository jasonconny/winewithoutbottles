# Cloudflare Worker (Static Assets) deploy for the WWOB site.
# Separate "staging" Worker from the live temp site (`wwob-tmp`): this deploys
# to a *.workers.dev URL and leaves winewithoutbottles.com untouched until the
# custom domain is moved here manually.
name = "winewithoutbottles"
compatibility_date = "2025-06-03"
account_id = "9166eee081850be3de4809d196801105"

[assets]
directory = "./dist"
# Serve index.html for unknown paths so client-side routes (/builder,
# /placeholder) deep-link correctly. This is the Workers-Static-Assets
# equivalent of a Pages `/* /index.html 200` redirect.
not_found_handling = "single-page-application"
